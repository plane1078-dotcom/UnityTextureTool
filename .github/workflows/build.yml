name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip \
            python3-dev \
            python3-venv \
            build-essential \
            autoconf \
            automake \
            libtool \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            ninja-build \
            git \
            zip \
            unzip \
            libltdl-dev \
            libbz2-dev \
            liblzma-dev \
            libsqlite3-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android"
          yes | sdkmanager --licenses 2>/dev/null || true
          # Buildozer will download its own SDK; this is just pre-acceptance

      - name: Cache Buildozer
        uses: actions/cache@v5
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-/usr/lib/jvm/java-17-openjdk-amd64}"
          echo "JAVA_HOME=$JAVA_HOME"
          buildozer -v android debug 2>&1

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unity-texture-tool-debug
          path: bin/*.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/build-*/**/*.log
            .buildozer/android/platform/build-*/**/build.log
          retention-days: 7

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
